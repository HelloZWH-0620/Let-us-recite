<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背书哇！</title>
  <style>
    :root{--bg:#f3f3f3;--fg:#1a1a1a;--card:rgba(255,255,255,0.72);--pri:#0078d4;--pri-fg:#fff;--muted:rgba(230,230,230,0.7);--muted-fg:#6b6b6b;--border:rgba(214,214,214,0.6);--orange:#e8871e;--sub:#767676;--hover:rgba(229,229,229,0.5);--active:rgba(204,204,204,0.6);--div:rgba(224,224,224,0.6);--warn:#f0c040}
    *{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
    body{font-family:'KaiTi','STKaiti','楷体',serif;height:100vh;overflow:hidden;color:var(--fg);display:flex;flex-direction:column;position:relative}
    body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:url('resource/bg.png') center/cover no-repeat;z-index:-2}
    body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(243,243,243,0.65);z-index:-1;backdrop-filter:blur(40px) saturate(1.8);-webkit-backdrop-filter:blur(40px) saturate(1.8)}
    .wrap{display:flex;flex:1;overflow:hidden}

    /* ===== SIDEBAR ===== */
    .side{width:280px;background:rgba(232,232,232,0.72);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);display:flex;flex-direction:column;flex-shrink:0;font-family:'Microsoft YaHei','Segoe UI',sans-serif}
    .side-head{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
    .side-head h1{font-size:15px;font-weight:600;color:var(--fg)}
    /* breathing light button */
    .mode-indicator{height:30px;padding:0 12px;border:1px solid var(--border);cursor:pointer;font-family:inherit;font-size:13px;color:var(--fg);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
    .mode-indicator:hover{background:var(--hover)}
    .mode-indicator:active{background:var(--active)}
    .mode-dot-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--warn);animation:breathe 2s ease-in-out infinite;pointer-events:none}
    .mode-indicator-text{position:relative;z-index:1}
    @keyframes breathe{0%,100%{opacity:.15}50%{opacity:.45}}

    /* search + mode switcher (order: switcher then search) */
    .mode-bar{display:flex;margin:0 16px 4px;border:1px solid var(--border);background:#fff}
    .mode-btn{flex:1;height:32px;border:none;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;color:var(--sub);transition:background .1s,color .1s}
    .mode-btn:hover{background:var(--hover)}
    .mode-btn.active{background:var(--pri);color:var(--pri-fg)}
    .search-wrap{padding:0 16px 4px;position:relative}
    .search-wrap svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);width:14px;height:14px;pointer-events:none;color:var(--muted-fg)}
    .search-box{width:100%;height:32px;border:1px solid var(--border);background:#fff;font-family:inherit;font-size:13px;color:var(--fg);padding:0 10px 0 28px;outline:none}
    .search-box:focus{border-color:var(--pri)}
    .search-box::placeholder{color:var(--muted-fg)}
    .side-div{height:1px;background:var(--border);margin:0 16px}
    .side-nav{flex:1;overflow-y:auto;padding-top:8px}
    .sec-label{padding:6px 16px 2px}
    .sec-label span{font-size:12px;color:var(--sub);font-weight:500;letter-spacing:.5px}
    .sbtn{min-height:44px;border:none;background:0 0;cursor:pointer;font-family:inherit;font-size:14px;color:var(--fg);text-align:left;padding:8px 16px;border-left:3px solid transparent;display:flex;align-items:center;width:100%}
    .sbtn:hover{background:var(--hover)}
    .sbtn:active{background:var(--active)}
    .sbtn.sel{background:var(--active);border-left-color:var(--pri)}

    /* Two-level collapsible nav */
    .nav-parent{min-height:44px;border:none;background:0 0;cursor:pointer;font-family:inherit;font-size:14px;color:var(--fg);text-align:left;padding:8px 16px;border-left:3px solid transparent;display:flex;align-items:center;width:100%;transition:background .1s,border-color .1s}
    .nav-parent:hover{background:var(--hover)}
    .nav-parent:active{background:var(--active)}
    .nav-parent.sel{background:var(--active);border-left-color:var(--pri)}
    .nav-parent.guide{color:var(--sub);cursor:default;font-size:13px}
    .nav-parent.guide:hover{background:transparent}
    .nav-arrow{margin-left:auto;font-size:11px;color:var(--muted-fg);transition:transform .2s;flex-shrink:0;padding-left:8px}
    .nav-arrow.open{transform:rotate(90deg)}
    .nav-children{display:none}
    .nav-children.open{display:block}
    .nav-child{min-height:40px;border:none;background:0 0;cursor:pointer;font-family:inherit;font-size:13px;color:var(--sub);text-align:left;padding:6px 16px 6px 40px;border-left:3px solid transparent;display:flex;align-items:center;width:100%;transition:background .1s,border-color .1s}
    .nav-child:hover{background:var(--hover)}
    .nav-child:active{background:var(--active)}
    .nav-child.sel{background:var(--active);border-left-color:var(--pri);color:var(--fg)}
    .more-wrap{border-top:1px solid var(--border)}
    .more-wrap .sbtn{font-size:13px;color:var(--sub)}

    /* ===== CONTENT ===== */
    .content{flex:1;overflow-y:auto;background:rgba(243,243,243,0.45);backdrop-filter:blur(30px) saturate(1.6);-webkit-backdrop-filter:blur(30px) saturate(1.6);position:relative}
    .content::-webkit-scrollbar{width:8px}
    .content::-webkit-scrollbar-track{background:0 0}
    .content::-webkit-scrollbar-thumb{background:#c1c1c1}

    /* Article view */
    .c-inner{padding:24px 24px 40px;display:flex;justify-content:center}
    .art{width:100%}
    .art-title{font-size:20px;font-weight:700;color:var(--fg);margin-bottom:4px}
    .art-author{font-size:16px;color:var(--sub);margin-bottom:16px}
    .art-body{font-size:16px;line-height:2;color:var(--fg)}
    .art-body p{margin-bottom:0.8em}

    /* Font size controls: always at bottom-right above player */
    .fs-ctrl{position:fixed;bottom:68px;right:16px;display:flex;gap:4px;z-index:10}
    .fs-btn{width:36px;height:36px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;color:var(--fg);display:flex;align-items:center;justify-content:center}
    .fs-btn:hover{background:var(--hover)}
    .fs-btn:active{background:var(--active)}

    /* Author cards */
    .author-grid{padding:40px 3vw;display:flex;flex-wrap:wrap;gap:20px;justify-content:flex-start}
    .author-card{width:calc(33.333% - 14px);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:border-color .15s;padding:20px}
    .author-card:hover{border-color:var(--pri)}
    .author-card-name{font-size:20px;font-weight:700;color:var(--fg);margin-bottom:4px;font-family:'Microsoft YaHei',sans-serif}
    .author-card-dynasty{font-size:13px;color:var(--sub);margin-bottom:12px;font-family:'Microsoft YaHei',sans-serif}
    .author-card-brief{font-size:14px;color:var(--muted-fg);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

    /* Author detail */
    .author-detail{padding:40px 3vw;max-width:900px}
    .author-detail-name{font-size:28px;font-weight:700;color:var(--fg);margin-bottom:4px;font-family:'Microsoft YaHei',sans-serif}
    .author-detail-dynasty{font-size:15px;color:var(--sub);margin-bottom:20px;font-family:'Microsoft YaHei',sans-serif}
    .author-detail-bio{font-size:15px;line-height:2;color:var(--fg);margin-bottom:28px}
    .author-detail-bio p{margin-bottom:1em}
    .author-detail-works-title{font-size:16px;font-weight:600;color:var(--fg);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--div);font-family:'Microsoft YaHei',sans-serif}
    .author-work-link{display:inline-block;padding:8px 16px;margin:4px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:'Microsoft YaHei',sans-serif;font-size:13px;color:var(--fg);transition:background .1s}
    .author-work-link:hover{background:var(--hover)}
    .back-btn{display:inline-block;padding:8px 16px;margin-bottom:20px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:'Microsoft YaHei',sans-serif;font-size:13px;color:var(--sub);transition:background .1s}
    .back-btn:hover{background:var(--hover)}

    /* About */
    .about{padding:40px 3vw;max-width:800px}
    .about-card{background:var(--card);border:1px solid var(--border);padding:16px 20px;margin-bottom:12px;font-family:'Microsoft YaHei',sans-serif}
    .about-card h3{font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--div)}
    .about-row{display:flex;padding:6px 0;font-size:14px}
    .about-label{flex-shrink:0;width:120px;color:var(--sub)}
    .about-value{color:var(--fg)}

    /* Placeholder */
    .placeholder-msg{text-align:center;color:var(--sub);font-size:18px;padding-top:120px;font-family:'Microsoft YaHei',sans-serif}

    /* ===== PLAYER ===== */
    .player{height:56px;background:rgba(255,255,255,0.72);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;flex-shrink:0;z-index:5}
    .p-btn{min-width:40px;min-height:36px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:'Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;color:var(--fg)}
    .p-btn:hover{background:var(--hover)}
    .p-btn:active{background:var(--active)}
    .p-btn.play{background:var(--pri);color:var(--pri-fg);border-color:var(--pri);min-width:48px}
    .p-btn.play:hover{background:#006cbd;border-color:#006cbd}
    .p-btn.play:active{background:#005a9e;border-color:#005a9e}
    .p-title{font-size:13px;color:var(--sub);white-space:nowrap;margin-right:16px;font-family:'Microsoft YaHei',sans-serif}
    .p-area{display:flex;align-items:center;flex:1;min-width:100px}
    .p-time{font-size:12px;color:var(--sub);white-space:nowrap;font-family:'Microsoft YaHei',sans-serif}
    .p-track{background:var(--muted);height:4px;cursor:pointer;flex:1}
    .p-fill{background:var(--orange);height:4px;width:0}
    .hidden{display:none!important}
  </style>
</head>
<body>
<div class="wrap">
  <aside class="side">
    <!-- Header: greeting + mode indicator -->
    <div class="side-head">
      <h1 id="greet"></h1>
      <button class="mode-indicator" id="modeIndicator"><span class="mode-dot-bg"></span><span class="mode-indicator-text" id="modeIndicatorText">学</span></button>
    </div>
    <!-- Mode switcher (above search) -->
    <div class="mode-bar" id="modeBar">
      <button class="mode-btn active" id="modeBtn1" data-mode="art">篇目</button>
      <button class="mode-btn" id="modeBtn2" data-mode="author">作家</button>
    </div>
    <!-- Search (below switcher) -->
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14" stroke-linecap="square"/></svg>
      <input class="search-box" id="searchIn" placeholder="搜索篇目">
    </div>
    <div class="side-div"></div>
    <nav class="side-nav" id="nav"></nav>
    <div class="more-wrap">
      <button class="sbtn" id="moreBtn">更多 More</button>
    </div>
  </aside>

  <main class="content" id="contentArea">
    <div id="viewArt">
      <div class="c-inner">
        <div class="art" id="artBox">
          <div class="art-title" id="artTitle"></div>
          <div class="art-author" id="artAuthor"></div>
          <div class="art-body" id="artBody"></div>
        </div>
      </div>
    </div>
    <div id="viewAuthors" class="hidden"><div class="author-grid" id="authorGrid"></div></div>
    <div id="viewAuthorDetail" class="author-detail hidden"></div>
    <div id="viewDynasty" class="hidden"><div class="author-grid" id="dynastyGrid"></div></div>
    <div id="viewAbout" class="about hidden">
      <div class="about-card">
        <h3>软件信息</h3>
        <div class="about-row"><span class="about-label">软件名称</span><span class="about-value">背书哇！</span></div>
        <div class="about-row"><span class="about-label">版本号</span><span class="about-value">0.0.1</span></div>
        <div class="about-row"><span class="about-label">作者</span><span class="about-value">@喔糖圆鼠</span></div>
        <div class="about-row"><span class="about-label">录音资源</span><span class="about-value">人民教育出版社</span></div>
      </div>
    </div>
  </main>
</div>

<!-- Font size controls: fixed position above player -->
<div class="fs-ctrl" id="fsCtrl">
  <button class="fs-btn" id="fsMinus">-</button>
  <button class="fs-btn" id="fsPlus">+</button>
</div>

<footer class="player">
  <button class="p-btn" style="font-size:13px;font-weight:700;margin-right:6px" id="btnRW">-5</button>
  <button class="p-btn play" style="font-size:16px;margin-right:6px" id="btnPP">&#9654;</button>
  <button class="p-btn" style="font-size:13px;font-weight:700;margin-right:16px" id="btnFF">+5</button>
  <span class="p-title" id="pTitle"></span>
  <div class="p-area">
    <span class="p-time" style="margin-right:8px" id="tCur">0:00</span>
    <div class="p-track" id="pTrack"><div class="p-fill" id="pFill"></div></div>
    <span class="p-time" style="margin-left:8px" id="tTotal">0:00</span>
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {

  /* ===== DATA ===== */
  var D = [
    // ===== 文言文 =====
    {
      id:'lunyu', title:'论语十二章', author:'孔子及其弟子', authorId:'kongzi', cat:'wenyanwen',
      audio:'',
      text:'子曰："君子食无求饱，居无求安，敏于事而慎于言，就有道而正焉，可谓好学也已。"(《学而》)\n\n子曰："人而不仁，如礼何？ 人而不仁，如乐何？"(《八佾》)\n\n子曰："朝闻道，夕死可矣。"(《里仁》)\n\n子曰："君子喻于义，小人喻于利。"(《里仁》)\n\n子曰："见贤思齐焉，见不贤而内自省也。"(《里仁》)\n\n子曰："质胜文则野，文胜质则史。文质彬彬，然后君子。"(《雍也》)\n\n曾子曰："士不可以不弘毅，任重而道远。仁以为己任，不亦重乎？死而后已，不亦远乎？"(《泰伯》)\n\n子曰："譬如为山，未成一篑，止，吾止也。譬如平地，虽覆一篑，进，吾往也。"(《子罕》)\n\n子曰："知者不惑，仁者不忧，勇者不惧。"(《子罕》)\n\n颜渊问仁。子曰："克己复礼为仁。一日克己复礼，天下归仁焉。为仁由己，而由人乎哉？"颜渊曰："请问其目。"子曰："非礼勿视，非礼勿听，非礼勿言，非礼勿动。"颜渊曰："回虽不敏，请事斯语矣。"(《颜渊》)\n\n子贡问曰："有一言而可以终身行之者乎？"子曰："其\u2018恕\u2019乎！己所不欲，勿施于人。"(《卫灵公》)\n\n子曰："小子何莫学夫《诗》？《诗》可以兴，可以观，可以群，可以怨。迩之事父，远之事君。多识于鸟兽草木之名。"(《阳货》)'
    },
    {
      id:'quanxue', title:'劝学', author:'荀子', authorId:'xunzi', cat:'wenyanwen',
      audio:'',
      text:'君子曰：学不可以已。\n\n青，取之于蓝，而青于蓝；冰，水为之，而寒于水。木直中绳，𫐓以为轮，其曲中规。虽有槁暴，不复挺者，𫐓使之然也。故木受绳则直，金就砺则利，君子博学而日参省乎己，则知明而行无过矣。\n\n吾尝终日而思矣，不如须臾之所学也；吾尝跂而望矣，不如登高之博见也。登高而招，臂非加长也，而见者远；顺风而呼，声非加疾也，而闻者彰。假舆马者，非利足也，而致千里；假舟楫者，非能水也，而绝江河。君子生非异也，善假于物也。\n\n积土成山，风雨兴焉；积水成渊，蛟龙生焉；积善成德，而神明自得，圣心备焉。故不积跬步，无以至千里；不积小流，无以成江海。骐骥一跃，不能十步；驽马十驾，功在不舍。锲而舍之，朽木不折；锲而不舍，金石可镂。蚓无爪牙之利，筋骨之强，上食埃土，下饮黄泉，用心一也。蟹六跪而二螯，非蛇鳝之穴无可寄托者，用心躁也。'
    },
    {
      id:'quyuanliezhuan', title:'屈原列传（节选）', author:'司马迁', authorId:'simaqian', cat:'wenyanwen',
      audio:'',
      text:'屈平疾王听之不聪也，谗谄之蔽明也，邪曲之害公也，方正之不容也，故忧愁幽思而作《离骚》。"离骚"者，犹离忧也。夫天者，人之始也；父母者，人之本也。人穷则反本，故劳苦倦极，未尝不呼天也；疾痛惨怛，未尝不呼父母也。屈平正道直行，竭忠尽智以事其君，谗人间之，可谓穷矣。信而见疑，忠而被谤，能无怨乎？屈平之作《离骚》，盖自怨生也。《国风》好色而不淫，《小雅》怨诽而不乱。若《离骚》者，可谓兼之矣。上称帝喾，下道齐桓，中述汤、武，以刺世事。明道德之广崇，治乱之条贯，靡不毕见。其文约，其辞微，其志洁，其行廉。其称文小而其指极大，举类迩而见义远。其志洁，故其称物芳；其行廉，故死而不容。自疏濯淖污泥之中，蝉蜕于浊秽，以浮游尘埃之外，不获世之滋垢，皭然泥而不滓者也。推此志也，虽与日月争光可也。'
    },
    {
      id:'jianshizuzhi', title:'谏太宗十思疏', author:'魏征', authorId:'weizheng', cat:'wenyanwen',
      audio:'',
      text:'臣闻求木之长者，必固其根本；欲流之远者，必浚其泉源；思国之安者，必积其德义。源不深而望流之远，根不固而求木之长，德不厚而思国之理，臣虽下愚，知其不可，而况于明哲乎！人君当神器之重，居域中之大，将崇极天之峻，永保无疆之休。不念居安思危，戒奢以俭，德不处其厚，情不胜其欲，斯亦伐根以求木茂，塞源而欲流长者也。\n\n凡百元首，承天景命，莫不殷忧而道著，功成而德衰。有善始者实繁，能克终者盖寡。岂取之易而守之难乎？昔取之而有余，今守之而不足，何也？夫在殷忧，必竭诚以待下；既得志，则纵情以傲物。竭诚则胡越为一体，傲物则骨肉为行路。虽董之以严刑，振之以威怒，终苟免而不怀仁，貌恭而不心服。怨不在大，可畏惟人；载舟覆舟，所宜深慎；奔车朽索，其可忽乎！\n\n君人者，诚能见可欲则思知足以自戒，将有作则思知止以安人，念高危则思谦冲而自牧，惧满溢则思江海下百川，乐盘游则思三驱以为度，忧懈怠则思慎始而敬终，虑壅蔽则思虚心以纳下，想谗邪则思正身以黜恶，恩所加则思无因喜以谬赏，罚所及则思无因怒而滥刑。总此十思，弘兹九德，简能而任之，择善而从之，则智者尽其谋，勇者竭其力，仁者播其惠，信者效其忠。文武争驰，在君无事，可以尽豫游之乐，可以养松、乔之寿，鸣琴垂拱，不言而化。何必劳神苦思，代下司职，役聪明之耳目，亏无为之大道哉！'
    },
    {
      id:'shishuo', title:'师说', author:'韩愈', authorId:'hanyu', cat:'wenyanwen',

  /* ===== UTILS ===== */
  function formatTime(sec) {
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function hideAllViews() {
    viewArt.classList.add('hidden');
    viewAuthors.classList.add('hidden');
    viewAuthorDetail.classList.add('hidden');
    viewDynasty.classList.add('hidden');
    viewAbout.classList.add('hidden');
    var btns = navEl.querySelectorAll('.sbtn');
    for (var j = 0; j < btns.length; j++) btns[j].classList.remove('sel');
    moreBtn.classList.remove('sel');
  }

  /* ===== SYSTEM MODE TOGGLE ===== */
  modeIndicator.onclick = function() {
    if (systemMode === 'learn') {
      systemMode = 'practice';
      modeIndicatorText.textContent = '练';
      modeBtn1.textContent = '句式';
      modeBtn2.textContent = '词类活用';
      searchIn.placeholder = '搜索句式';
      sidebarTab = 'jushi';
    } else {
      systemMode = 'learn';
      modeIndicatorText.textContent = '学';
      modeBtn1.textContent = '篇目';
      modeBtn2.textContent = '作家';
      searchIn.placeholder = '搜索篇目';
      sidebarTab = 'art';
    }
    modeBtn1.classList.add('active');
    modeBtn2.classList.remove('active');
    searchIn.value = '';
    renderSidebar();
    if (systemMode === 'learn') {
      selectArticle(cur.id);
    } else {
      showPlaceholder();
    }

  /* ===== RENDER: Sidebar ===== */
  function renderSidebar() {
    if (systemMode === 'learn') {
      if (sidebarTab === 'art') {
        renderArticleNav();
      } else {
        renderDynastyNav();
      }
    } else if (sidebarTab === 'jushi') {
      renderJushiNav();
    } else {
      navEl.innerHTML = '<div class="placeholder-msg" style="padding-top:40px">功能开发中...</div>';
    }
  }

  function renderArticleNav() {
    var html = '';
    var cats = [{key:'wenyanwen', label:'文言文'}, {key:'gushici', label:'古诗词'}];
    for (var c = 0; c < cats.length; c++) {
      html += '<div class="sec-label" data-cat="' + cats[c].key + '"><span>' + cats[c].label + '</span></div>';
      for (var i = 0; i < D.length; i++) {
        if (D[i].cat === cats[c].key) {
          var sel = (cur && cur.id === D[i].id) ? ' sel' : '';
          html += '<button class="sbtn' + sel + '" data-id="' + D[i].id + '">' + D[i].title + '</button>';
        }
      }
    }
    navEl.innerHTML = html;
    bindBtns(navEl, 'data-id', function(btn) { selectArticle(btn.getAttribute('data-id')); });
  }

  function renderDynastyNav() {
    var html = '';
    var dynasties = [];
    var seen = {};
    for (var i = 0; i < AUTHORS.length; i++) {
      if (!seen[AUTHORS[i].dynasty]) {
        seen[AUTHORS[i].dynasty] = true;
        dynasties.push(AUTHORS[i].dynasty);
      }
    }
    for (var d = 0; d < dynasties.length; d++) {
      var sel = (currentDynasty === dynasties[d]) ? ' sel' : '';
      html += '<button class="sbtn' + sel + '" data-dynasty="' + dynasties[d] + '">' + dynasties[d] + '</button>';
    }
    navEl.innerHTML = html;
    bindBtns(navEl, 'data-dynasty', function(btn) {
      var dyn = btn.getAttribute('data-dynasty');
      currentDynasty = dyn;
      renderDynastyNav();
      showDynastyCards(dyn);
    });
  }

  function bindBtns(container, attr, handler) {
    var btns = container.querySelectorAll('.sbtn');
    for (var i = 0; i < btns.length; i++) {
      (function(btn) { btn.onclick = function() { handler(btn); }; })(btns[i]);
    }
  }

  /* ===== RENDER: Content ===== */
  function renderText(txt) {
    var paras = txt.split('\n\n');
    var html = '';
    for (var i = 0; i < paras.length; i++) {
      html += '<p>' + paras[i].replace(/\n/g, '<br>') + '</p>';
    }
    artBody.innerHTML = html;
    artBody.style.fontSize = bodyFontSize + 'px';
  }

  function renderDynastyCards(dynastyName) {
    var html = '';
    for (var i = 0; i < AUTHORS.length; i++) {
      var a = AUTHORS[i];
      if (dynastyName && a.dynasty !== dynastyName) continue;
      var brief = a.bio.split('\n')[0];
      html += '<div class="author-card" data-author-id="' + a.id + '">';
      html += '<div class="author-card-name">' + a.name + '</div>';
      html += '<div class="author-card-dynasty">' + a.dynasty + '</div>';
      html += '<div class="author-card-brief">' + brief + '</div>';
      html += '</div>';
    }
    dynastyGrid.innerHTML = html;
    var cards = dynastyGrid.querySelectorAll('.author-card');
    for (var j = 0; j < cards.length; j++) {
      (function(card) {
        card.onclick = function() { showAuthorDetail(card.getAttribute('data-author-id')); };
      })(cards[j]);
    }
  }

  function renderAuthorDetail(authorId) {
    var author = null;
    for (var i = 0; i < AUTHORS.length; i++) {
      if (AUTHORS[i].id === authorId) { author = AUTHORS[i]; break; }
    }
    if (!author) return;
    var html = '';
    html += '<div class="back-btn" id="backBtn">&lt; 返回</div>';
    html += '<div class="author-detail-name">' + author.name + '</div>';
    html += '<div class="author-detail-dynasty">' + author.dynasty + '</div>';
    var bioParas = author.bio.split('\n\n');
    html += '<div class="author-detail-bio">';
    for (var p = 0; p < bioParas.length; p++) html += '<p>' + bioParas[p] + '</p>';
    html += '</div>';
    html += '<div class="author-detail-works-title">相关篇目</div>';
    for (var a = 0; a < D.length; a++) {
      if (D[a].authorId === authorId) {
        html += '<span class="author-work-link" data-article-id="' + D[a].id + '">' + D[a].title + '</span>';
      }
    }
    viewAuthorDetail.innerHTML = html;
    document.getElementById('backBtn').onclick = function() {
      if (currentDynasty) { showDynastyCards(currentDynasty); }
      else { showDynastyCards(null); }
    };
    var links = viewAuthorDetail.querySelectorAll('.author-work-link');
    for (var k = 0; k < links.length; k++) {
      (function(link) { link.onclick = function() { selectArticle(link.getAttribute('data-article-id')); }; })(links[k]);
    }
  }

  /* ===== Render: Practice - Jushi (句式) Nav ===== */
  function renderJushiNav() {
    var items = [
      {name:'判断句', id:'panduan', children:[]},
      {name:'被动句', id:'beidong', children:[]},
      {name:'倒装句', id:'daozhuang', guide:true, children:[
        {name:'宾语前置', id:'binyu'},
        {name:'状语后置', id:'zhuangyu'},
        {name:'定语后置', id:'dingyu'},
        {name:'主谓倒装', id:'zhuwei'}
      ]},
      {name:'省略句', id:'shenglve', guide:true, children:[
        {name:'省略主语', id:'shengzhuyu'},
        {name:'省略谓语', id:'shengweiyu'},
        {name:'省略宾语', id:'shengbinyu'},
        {name:'省略介词', id:'shengjieci'}
      ]}
    ];
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var hasChildren = item.children.length > 0;
      var isGuide = item.guide ? ' guide' : '';
      html += '<button class="nav-parent' + isGuide + '" data-nav-id="' + item.id + '">';
      html += '<span>' + item.name + '</span>';
      if (hasChildren) {
        html += '<span class="nav-arrow">&#9654;</span>';
      }
      html += '</button>';
      if (hasChildren) {
        html += '<div class="nav-children" data-parent="' + item.id + '">';
        for (var j = 0; j < item.children.length; j++) {
          var ch = item.children[j];
          html += '<button class="nav-child" data-nav-id="' + ch.id + '">' + ch.name + '</button>';
        }
        html += '</div>';
      }
    }
    navEl.innerHTML = html;
    // bind parent toggle
    var parents = navEl.querySelectorAll('.nav-parent');
    for (var p = 0; p < parents.length; p++) {
      (function(parentBtn) {
        var id = parentBtn.getAttribute('data-nav-id');
        var childDiv = navEl.querySelector('.nav-children[data-parent="' + id + '"]');
        var arrow = parentBtn.querySelector('.nav-arrow');
        if (childDiv) {
          // guide button: only toggles children, no content display
          parentBtn.onclick = function() {
            childDiv.classList.toggle('open');
            if (arrow) arrow.classList.toggle('open');
          };
        } else {
          parentBtn.onclick = function() {
            var allP = navEl.querySelectorAll('.nav-parent');
            for (var k = 0; k < allP.length; k++) allP[k].classList.remove('sel');
            var allC = navEl.querySelectorAll('.nav-child');
            for (var k = 0; k < allC.length; k++) allC[k].classList.remove('sel');
            parentBtn.classList.add('sel');
            showPlaceholder('功能开发中...');
          };
        }
      })(parents[p]);
    }
    // bind child click
    var children = navEl.querySelectorAll('.nav-child');
    for (var c = 0; c < children.length; c++) {
      (function(childBtn) {
        childBtn.onclick = function() {
          var allP = navEl.querySelectorAll('.nav-parent');
          for (var k = 0; k < allP.length; k++) allP[k].classList.remove('sel');
          var allC = navEl.querySelectorAll('.nav-child');
          for (var k = 0; k < allC.length; k++) allC[k].classList.remove('sel');
          childBtn.classList.add('sel');
          showPlaceholder('功能开发中...');
        };
      })(children[c]);
    }
  }

  function showPlaceholder(msg) {
    hideAllViews();
    viewArt.classList.remove('hidden');
    artTitle.textContent = '';
    artAuthor.textContent = '';
    artBody.innerHTML = '<div class="placeholder-msg">' + (msg || '功能开发中...') + '</div>';
  }

  /* ===== AUDIO ===== */
  function syncProgress() {
    var dur = audioEl.duration || 0;
    var ct = audioEl.currentTime || 0;
    pFill.style.width = dur > 0 ? (ct / dur * 100) + '%' : '0%';
    tCur.textContent = formatTime(ct);
  }

  function loadAudio() {
    audioEl.pause();
    playing = false;
    btnPP.innerHTML = '&#9654;';
    if (cur.audio) {
      audioEl.src = cur.audio;
      audioEl.load();
      audioEl.onloadedmetadata = function() {
        tTotal.textContent = formatTime(audioEl.duration);
        syncProgress();
      };
      audioEl.ontimeupdate = syncProgress;
      audioEl.onended = function() { playing = false; btnPP.innerHTML = '&#9654;'; };
    } else {
      audioEl.src = '';
      audioEl.onloadedmetadata = null;
      audioEl.ontimeupdate = null;
      audioEl.onended = null;
    }
    pTitle.textContent = cur.title + ' - ' + cur.author + (cur.audio ? '' : '（暂无音频）');
    tTotal.textContent = '0:00';
    tCur.textContent = '0:00';
    pFill.style.width = '0%';
  }

  document.getElementById('btnRW').onclick = function() { audioEl.currentTime = Math.max(0, audioEl.currentTime - 5); };
  document.getElementById('btnFF').onclick = function() { audioEl.currentTime = Math.min(audioEl.duration || 0, audioEl.currentTime + 5); };

  };
  pTrack.onclick = function(e) {
    var rect = pTrack.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (audioEl.duration) audioEl.currentTime = pct * audioEl.duration;
  };

  moreBtn.onclick = showAboutView;

  /* ===== SEARCH ===== */
  searchIn.oninput = function() {
    var kw = searchIn.value.trim().toLowerCase();
    if (systemMode === 'learn' && sidebarTab === 'art') {
      var btns = navEl.querySelectorAll('.sbtn');
      for (var i = 0; i < btns.length; i++) {
        var id = btns[i].getAttribute('data-id');
        var article = null;
        for (var j = 0; j < D.length; j++) { if (D[j].id === id) { article = D[j]; break; } }
        if (!article) continue;
        btns[i].style.display = (!kw || article.title.toLowerCase().indexOf(kw) >= 0 || article.author.toLowerCase().indexOf(kw) >= 0) ? 'flex' : 'none';
      }
      var cats = ['wenyanwen', 'gushici'];
      for (var c = 0; c < cats.length; c++) {
        var lbl = navEl.querySelector('.sec-label[data-cat="' + cats[c] + '"]');
        if (!lbl) continue;
        var sib = lbl.nextElementSibling;
        if (sib && sib.classList.contains('sbtn')) lbl.style.display = (kw && sib.style.display === 'none') ? 'none' : '';
      }
    }
  };

  /* ===== INIT ===== */
  renderArticleNav();
  selectArticle('lunyu');

});
</script>
</body>
</html>
